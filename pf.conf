###=========================================================
### pf.conf — configurazione PF raffinata e commentata
###=========================================================

# Evita filtraggio sul loopback
set skip on lo

# Default deny (approccio sicuro)
block all

# Protezione antispoofing
antispoof quick for egress

#==========================================================
# TABELLE
#==========================================================

# Table per uso temporaneo durante aggiornamenti di sistema
table <updates> persist

# Table per IP dei server mail (popolata da /etc/mailserver_ips)
table <mailserver> persist file "/etc/mailserver_ips"

#==========================================================
# CONNETTIVITÀ DI BASE (sistema e servizi essenziali)
#==========================================================

# Accesso HTTP/HTTPS solo verso IP nella table <updates>
pass out quick log on egress proto tcp from any to <updates> port { 80 443 } flags S/SA

# Permetti DNS (TCP/UDP 53) per utenti abilitati
# (anche anche a pkgfetch che interviene in coda a root durante pkg_add)
pass out quick on egress proto { tcp udp } from any to any port 53 \
  user { root userweb usermail userlan _pkgfetch } flags S/SA

# DHCP client → server
pass out quick on egress proto udp from any port 68 to any port 67

# NTP (per sincronizzazione oraria)
pass out quick on egress proto udp from any to any port 123

#==========================================================
# HTTP/HTTPS E POSTA
#==========================================================

# Navigazione web (solo utente userweb)
pass out quick on egress proto tcp from any to any port { 80 443 } user userweb flags S/SA

# Accesso ai server di posta da parte di usermail
pass out quick on egress proto tcp from any to <mailserver> \
  port { 25 443 465 587 993 995 } user usermail flags S/SA

#==========================================================
# LAN / UTENTE LOCALE
#==========================================================

# Accesso alla LAN (TCP/UDP)
pass out quick on egress proto { tcp udp } from any to 192.168.0.0/16 user userlan

# Accesso Syncthing (TCP 22000, UDP 21027, TCP 443)
pass out quick on egress proto tcp from any to any port 22000 user userlan flags S/SA
pass out quick on egress proto udp from any to any port 21027 user userlan
#pass out quick on egress proto tcp from any to any port 443 user userlan flags S/SA

# (Opzionale) Consenti ping nella LAN
# pass out quick on egress proto icmp from any to 192.168.0.0/16 user userlan

#==========================================================
# ACCESSO SPECIFICO
#==========================================================

# Accesso a cPanel Cloudamo (eu05.server.plus → 37.58.52.209)
pass out quick on egress proto tcp to 37.58.52.209 port { 2083 2096 } user userweb flags S/SA

#==========================================================
# SSH (rsync / amministrazione)
#==========================================================

# Consenti SSH in uscita (porta definita: 22 o altro) verso qualunque host (any) o host specifico (IP) per userweb
pass out quick on egress proto tcp from any to 46.165.196.66 port 52820 user userweb flags S/SA

# Permetti connessioni SSH verso GitHub via porta 443 (usando ssh.github.com)
pass out quick on egress proto tcp from any to { 140.82.121.34, 140.82.121.35, 140.82.121.36 } port 443 user userweb flags S/SA

# Consenti SSH solo nella LAN per userlan (192.168/16)
pass out quick on egress proto tcp from any to 192.168.0.0/16 port 3315 user userlan flags S/SA


#==========================================================
# NOTE DI SUPPORTO
#==========================================================

# Per aggiornamenti manuali:
#   pfctl -t updates -T add <IP>
#
# Verifica sintassi:
#   pfctl -nf /etc/pf.conf
#
# Ricarica configurazione:
#   pfctl -f /etc/pf.conf
#
# Debug log:
#   tcpdump -n -e -ttt -i pflog0

