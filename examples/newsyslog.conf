# ==========================================================
#  dropQbsd -- example newsyslog.conf entries
#
#  Log rotation rules for all dropQbsd components.
#
#  IMPORTANT: Append these lines to the existing
#  /etc/newsyslog.conf -- do NOT replace it. OpenBSD ships
#  with its own system rotation rules that must be preserved.
#
#  Usage:
#    # cat examples/newsyslog.conf >> /etc/newsyslog.conf
#    # newsyslog -n -f /etc/newsyslog.conf    (dry run)
#
#  enforce_drop and enforce_sync run every minute -- rotate
#  daily, keep 7 archives. verify_integrity runs every 5
#  minutes -- same policy. Update logs grow slowly (manual
#  runs only) -- rotate at 100 KB, keep 3 archives.
# ==========================================================

# dropQbsd logs
/var/log/dropQbsd_drop.log        root:wheel   640  7     *     @T00  Z
/var/log/dropQbsd_sync.log        root:wheel   640  7     *     @T00  Z
/var/log/dropQbsd_integrity.log   root:wheel   640  7     *     @T00  Z
/var/log/dropQbsd_updates.log     root:wheel   640  3     100   *     Z
